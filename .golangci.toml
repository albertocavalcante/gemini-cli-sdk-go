version = "2"

[run]
timeout = "5m"
tests = true
modules-download-mode = "readonly"

[linters]
enable = [
  "errcheck", "govet", "staticcheck", "unused",
  "ineffassign", "goconst", "gocritic", "misspell",
  "unconvert", "unparam", "whitespace", "copyloopvar", "intrange"
]

[formatters]
enable = ["gofmt", "goimports"]

[formatters.settings.goimports]
local-prefixes = ["github.com/albertocavalcante/gemini-cli-sdk-go"]
